services:
  postgres:
    image: postgres:16
    container_name: orbita-postgres
    environment:
      POSTGRES_DB: orbita
      POSTGRES_USER: orbita
      POSTGRES_PASSWORD: orbita
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - orbita_data:/var/lib/postgresql/data

volumes:
  orbita_data: